version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: many-balloons-app
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://host.docker.internal:27017/many_balloons
      NODE_ENV: production
      JWT_SECRET: "replace-with-a-long-random-string"
      TZ: America/Denver
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container reach the host's published port
    volumes:
      - /mnt/user/appdata/birthday-tracker/uploads:/app/server/dist/uploads
    ports:
      - "5000:5000"